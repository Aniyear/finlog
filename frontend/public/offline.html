<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinLog — Офлайн</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0e1a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .offline {
      max-width: 400px;
    }
    .offline__icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    .offline__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .offline__text {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .offline__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline__icon">📡</div>
    <h1 class="offline__title">Нет подключения</h1>
    <p class="offline__text">
      Проверьте интернет-соединение и попробуйте снова.
    </p>
    <button class="offline__btn" onclick="location.reload()">
      🔄 Обновить
    </button>
  </div>
</body>
</html>
